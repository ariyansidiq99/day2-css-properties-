<body>
    <section class="experiment" id="exp1">
        <h2>Experiment 1: Adjusting Sibilings</h2>
        <p class="box-a">Box A - Margin Bottom 40px</p>
        <p class="box-b">Box B - Margin Top 30px</p>
    </section>

    <section class="experiment" id="exp-2">
        <h2>Parent-Child Collapse</h2>
        <div class="parent">
            <p class="child">Child Margin-top 50px</p>
        </div>
    </section>
    <section class="experiment" id="exp-3">
        <h2>Flex Eliminates collapse</h2>
        <div class="flex-parent">
             <p class="box-a">Box A - Margin Bottom 40px</p>
        <p class="box-b">Box B - Margin Top 30px</p>
        </div>
        </section>
